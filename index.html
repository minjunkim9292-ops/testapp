<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Todo</h1>
      <form id="new-todo-form" class="new-todo">
        <input
          id="new-todo-input"
          type="text"
          placeholder="What needs to be done?"
          autocomplete="off"
          aria-label="New todo"
        />
        <button type="submit">Add</button>
      </form>
      <ul id="todo-list" class="todo-list"></ul>
      <p id="empty-state" class="empty">No todos yet.</p>
    </main>
    <script src="app.js"></script>
  </body>
</html>
